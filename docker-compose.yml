services:
  postgres:
    image: postgres:17
    container_name: bittuly-postgres
    environment:
      POSTGRES_USER: bittu
      POSTGRES_PASSWORD: bittu
      POSTGRES_DB: bittuly
    ports:
      - "5432:5432"
    volumes:
      - bittuly-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bittu -d bittuly"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bittuly-postgres-data:

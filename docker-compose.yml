services:
  postgres:
    image: postgres:17
    container_name: bittuly-postgres
    environment:
      POSTGRES_USER: bittu
      POSTGRES_PASSWORD: bittu
      POSTGRES_DB: bittuly
    ports:
      - "5432:5432"
    volumes:
      - bittuly-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bittu -d bittuly"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2.7-bookworm
    container_name: bittuly-redis
    command: >
      redis-server
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  bittuly-postgres-data:
